<article class="chart-card">
  <header>
    <div>
      <p class="label">Activity over time</p>
      <h2>Commit trend</h2>
    </div>
    @if (loading$ | async) {
      <span class="status">Updating</span>
    }
  </header>

  @if (error$ | async; as error) {
    <div class="error" role="alert">
      <span>{{ error }}</span>
      <button type="button" (click)="retry()">Retry</button>
    </div>
  }

  <div class="chart-frame">
    @if (loading$ | async) {
      <div class="chart-skeleton" aria-hidden="true">
        @for (bar of skeletonBars; track bar) {
          <span></span>
        }
      </div>
    }
    <canvas
      baseChart
      [data]="(chartData$ | async) ?? emptyChartData"
      [options]="chartOptions"
      [type]="'line'"
    ></canvas>
  </div>
</article>
