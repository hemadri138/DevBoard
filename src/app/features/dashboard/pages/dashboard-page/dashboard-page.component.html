<main class="dashboard-shell" [class.light-theme]="(theme$ | async) === 'light'">
  <header class="top-bar">
    <span>DevBoard</span>
    <button type="button" (click)="toggleTheme()">
      {{ themeToggleLabel$ | async }}
    </button>
  </header>

  <section class="dashboard-hero" aria-labelledby="dashboard-title">
    <div>
      <p class="eyebrow">DevBoard</p>
      <h1 id="dashboard-title">Engineering analytics dashboard</h1>
      <p class="hero-copy">
        A modular Angular workspace backed by NgRx, lazy-loaded features, and
        live GitHub repository telemetry.
      </p>
    </div>
  </section>

  <app-filter-panel />

  <section class="widget-grid" aria-label="Dashboard widgets">
    <app-kpi-card />
    <app-activity-chart />
    <app-recent-activity-table />
  </section>
</main>
